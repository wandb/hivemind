{{- if .Values.clickhouse.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hivemind.fullname" . }}-clickhouse
  labels:
    {{- include "hivemind.componentLabels" (dict "ctx" . "component" "clickhouse") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.clickhouse.httpPort }}
      targetPort: http
    - name: native
      port: {{ .Values.clickhouse.nativePort }}
      targetPort: native
  selector:
    {{- include "hivemind.componentSelectorLabels" (dict "ctx" . "component" "clickhouse") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "hivemind.fullname" . }}-clickhouse
  labels:
    {{- include "hivemind.componentLabels" (dict "ctx" . "component" "clickhouse") | nindent 4 }}
spec:
  serviceName: {{ include "hivemind.fullname" . }}-clickhouse
  replicas: 1
  selector:
    matchLabels:
      {{- include "hivemind.componentSelectorLabels" (dict "ctx" . "component" "clickhouse") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hivemind.componentLabels" (dict "ctx" . "component" "clickhouse") | nindent 8 }}
      {{- with .Values.clickhouse.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.clickhouse.podSecurityContext | default .Values.podSecurityContext) }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.clickhouse.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.clickhouse.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.clickhouse.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: clickhouse
          image: "{{ .Values.clickhouse.image.repository }}:{{ .Values.clickhouse.image.tag }}"
          imagePullPolicy: {{ .Values.clickhouse.image.pullPolicy }}
          {{- with .Values.clickhouse.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: CLICKHOUSE_DB
              value: {{ .Values.clickhouse.database | quote }}
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
            {{- if .Values.clickhouse.password }}
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.user | quote }}
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hivemind.secretName" . }}
                  key: CLICKHOUSE_PASSWORD
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.clickhouse.httpPort }}
            - name: native
              containerPort: {{ .Values.clickhouse.nativePort }}
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.clickhouse.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
      {{- if not .Values.clickhouse.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.clickhouse.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.clickhouse.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.clickhouse.persistence.size | quote }}
  {{- end }}
{{- end }}
