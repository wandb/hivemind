{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  # Revisioned name: Job pod templates are immutable, so each install/upgrade
  # creates a fresh Job rather than colliding with a prior one.
  name: {{ include "hivemind.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "hivemind.componentLabels" (dict "ctx" . "component" "migrate") | nindent 4 }}
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "hivemind.componentLabels" (dict "ctx" . "component" "migrate") | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "hivemind.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "hivemind.waitForClickHouse" . | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "hivemind.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["python", "-m", "agentstream_api.migrations", "migrate"]
          envFrom:
            {{- include "hivemind.envFrom" . | nindent 12 }}
          env:
            {{- include "hivemind.datastorePasswordEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
