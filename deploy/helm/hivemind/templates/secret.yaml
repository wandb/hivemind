{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
{{- /*
  Preserve an auto-generated JWT_SECRET across upgrades: reuse the existing
  Secret's value when the operator hasn't pinned one explicitly.
*/ -}}
{{- $secretName := printf "%s-secrets" (include "hivemind.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $jwt := .Values.secrets.jwtSecret }}
{{- if not $jwt }}
  {{- if and $existing $existing.data (hasKey $existing.data "JWT_SECRET") }}
    {{- $jwt = index $existing.data "JWT_SECRET" | b64dec }}
  {{- else }}
    {{- $jwt = randAlphaNum 64 }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "hivemind.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  JWT_SECRET: {{ $jwt | quote }}
  {{- with .Values.secrets.hivemindSecretKey }}
  HIVEMIND_SECRET_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.license }}
  HIVEMIND_LICENSE: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.githubApp.clientId }}
  GITHUB_APP_CLIENT_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.githubApp.clientSecret }}
  GITHUB_APP_CLIENT_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.githubApp.webhookSecret }}
  GITHUB_APP_WEBHOOK_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.githubApp.privateKey }}
  GITHUB_APP_PRIVATE_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.githubOAuth.clientId }}
  GITHUB_OAUTH_CLIENT_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.githubOAuth.clientSecret }}
  GITHUB_OAUTH_CLIENT_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.llm.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.llm.openaiApiKey }}
  OPENAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.llm.apiKey }}
  LLM_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.llm.embeddingsApiKey }}
  EMBEDDINGS_API_KEY: {{ . | quote }}
  {{- end }}
  {{- if and .Values.clickhouse.enabled .Values.clickhouse.password }}
  CLICKHOUSE_PASSWORD: {{ .Values.clickhouse.password | quote }}
  {{- else if and (not .Values.clickhouse.enabled) (not .Values.externalClickHouse.existingSecret) .Values.externalClickHouse.password }}
  CLICKHOUSE_PASSWORD: {{ .Values.externalClickHouse.password | quote }}
  {{- end }}
  {{- if and .Values.redis.enabled .Values.redis.password }}
  REDIS_PASSWORD: {{ .Values.redis.password | quote }}
  {{- else if and (not .Values.redis.enabled) (not .Values.externalRedis.existingSecret) .Values.externalRedis.password }}
  REDIS_PASSWORD: {{ .Values.externalRedis.password | quote }}
  {{- end }}
  {{- if eq .Values.storage.provider "s3" }}
  {{- with .Values.storage.s3.accessKeyId }}
  AWS_ACCESS_KEY_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.storage.s3.secretAccessKey }}
  AWS_SECRET_ACCESS_KEY: {{ . | quote }}
  {{- end }}
  {{- end }}
{{- end }}
