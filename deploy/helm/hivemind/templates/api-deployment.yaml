apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hivemind.fullname" . }}-api
  labels:
    {{- include "hivemind.componentLabels" (dict "ctx" . "component" "api") | nindent 4 }}
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "hivemind.componentSelectorLabels" (dict "ctx" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hivemind.componentLabels" (dict "ctx" . "component" "api") | nindent 8 }}
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "hivemind.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.api.waitForClickHouse }}
      initContainers:
        {{- include "hivemind.waitForClickHouse" . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "hivemind.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            {{- include "hivemind.envFrom" . | nindent 12 }}
          env:
            - name: AUTO_MIGRATE
              value: {{ .Values.api.autoMigrate | quote }}
            {{- include "hivemind.datastorePasswordEnv" . | nindent 12 }}
            {{- include "hivemind.tracingEnv" (dict "ctx" . "component" "api") | nindent 12 }}
            {{- with .Values.config.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: {{ .Values.api.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.api.startupProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: {{ .Values.api.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.api.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: {{ .Values.api.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.api.readinessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          {{- if or (and (eq .Values.storage.provider "local") .Values.storage.local.persistence.enabled) (and (eq .Values.storage.provider "gcs") .Values.storage.gcs.existingSecret) }}
          volumeMounts:
            {{- if and (eq .Values.storage.provider "local") .Values.storage.local.persistence.enabled }}
            - name: storage
              mountPath: {{ .Values.storage.local.mountPath }}
            {{- end }}
            {{- if and (eq .Values.storage.provider "gcs") .Values.storage.gcs.existingSecret }}
            - name: gcs-key
              mountPath: /var/secrets/gcs
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or (and (eq .Values.storage.provider "local") .Values.storage.local.persistence.enabled) (and (eq .Values.storage.provider "gcs") .Values.storage.gcs.existingSecret) }}
      volumes:
        {{- if and (eq .Values.storage.provider "local") .Values.storage.local.persistence.enabled }}
        - name: storage
          persistentVolumeClaim:
            claimName: {{ .Values.storage.local.persistence.existingClaim | default (printf "%s-storage" (include "hivemind.fullname" .)) }}
        {{- end }}
        {{- if and (eq .Values.storage.provider "gcs") .Values.storage.gcs.existingSecret }}
        - name: gcs-key
          secret:
            secretName: {{ .Values.storage.gcs.existingSecret }}
        {{- end }}
      {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hivemind.fullname" . }}-api
  labels:
    {{- include "hivemind.componentLabels" (dict "ctx" . "component" "api") | nindent 4 }}
  {{- with .Values.api.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "hivemind.componentSelectorLabels" (dict "ctx" . "component" "api") | nindent 4 }}
