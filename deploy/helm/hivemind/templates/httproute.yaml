{{- if .Values.gateway.enabled }}
{{- $fullname := include "hivemind.fullname" . }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "hivemind.componentLabels" (dict "ctx" . "component" "api") | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range .Values.gateway.parentRefs }}
    - name: {{ required "gateway.parentRefs[].name is required when gateway.enabled=true" .name }}
      {{- with .namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .sectionName }}
      sectionName: {{ . }}
      {{- end }}
      {{- with .port }}
      port: {{ . }}
      {{- end }}
    {{- end }}
  hostnames:
    {{- if .Values.gateway.hostnames }}
    {{- range .Values.gateway.hostnames }}
    - {{ . | quote }}
    {{- end }}
    {{- else }}
    - {{ include "hivemind.externalHost" . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.ingress.path | default "/" }}
      backendRefs:
        - name: {{ $fullname }}-api
          port: {{ .Values.api.service.port }}
{{- end }}
