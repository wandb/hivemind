{{/*
Kubernetes infrastructure telemetry → ClickStack's ClickHouse, so HyperDX's
Kubernetes dashboards light up. Mirrors the trace collector's direct-to-CH path
(the otel_metrics and otel_logs schema the provisioned HyperDX sources read), so
it needs no HyperDX ingestion key and works regardless of account-setup state.

  - node DaemonSet: kubeletstats (node/pod/container) + hostmetrics + pod-log
    filelog, enriched with k8s metadata. Runs as root with read-only host mounts
    to read /var/log/pods and the node filesystem -- a deliberate exception to
    the chart's non-root container defaults.
  - cluster Deployment (1 replica): k8s_cluster object-state metrics + k8s events.

The collector configs are named templates so each workload can both render them
into its ConfigMap AND checksum the exact rendered content (a checksum over
values alone would miss config edits and leave stale pods running).
*/}}
{{- define "hivemind.k8sMetrics.nodeConfig" -}}
{{- $fullname := include "hivemind.fullname" . -}}
{{- $km := .Values.observability.clickstack.kubernetesMetrics -}}
{{- $ch := .Values.observability.collector.clickhouse -}}
{{- $cluster := $km.clusterName | default .Release.Name -}}
receivers:
  kubeletstats:
    collection_interval: {{ $km.collectionInterval }}
    auth_type: serviceAccount
    endpoint: https://${env:K8S_NODE_NAME}:10250
    insecure_skip_verify: true
    metric_groups: [node, pod, container, volume]
  hostmetrics:
    collection_interval: {{ $km.collectionInterval }}
    root_path: /hostfs
    scrapers:
      cpu: {}
      load: {}
      memory: {}
      disk: {}
      filesystem:
        exclude_mount_points:
          mount_points: ["/var/lib/kubelet/*", "/dev/*", "/proc/*", "/sys/*"]
          match_type: regexp
      network: {}
  {{- if $km.logsCollection }}
  filelog:
    include: [/var/log/pods/*/*/*.log]
    exclude: [/var/log/pods/*/otel-collector/*.log]
    include_file_path: true
    start_at: end
    operators:
      - type: container
        id: container-parser
  {{- end }}
processors:
  batch: {}
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25
  k8sattributes:
    auth_type: serviceAccount
    passthrough: false
    extract:
      metadata:
        - k8s.namespace.name
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.pod.start_time
        - k8s.deployment.name
        - k8s.replicaset.name
        - k8s.daemonset.name
        - k8s.statefulset.name
        - k8s.node.name
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.uid
      - sources:
          - from: resource_attribute
            name: k8s.pod.ip
      - sources:
          - from: connection
  resourcedetection:
    detectors: [env, system]
    system:
      hostname_sources: [os]
  resource:
    attributes:
      - key: k8s.cluster.name
        value: {{ $cluster | quote }}
        action: upsert
exporters:
  clickhouse:
    endpoint: tcp://{{ $fullname }}-clickstack:9000?dial_timeout=10s
    database: {{ $ch.database }}
    username: {{ $ch.username }}
    password: {{ $ch.password | quote }}
    create_schema: true
service:
  pipelines:
    metrics:
      receivers: [kubeletstats, hostmetrics]
      processors: [memory_limiter, k8sattributes, resourcedetection, resource, batch]
      exporters: [clickhouse]
    {{- if $km.logsCollection }}
    logs:
      receivers: [filelog]
      processors: [memory_limiter, k8sattributes, resourcedetection, resource, batch]
      exporters: [clickhouse]
    {{- end }}
{{- end -}}

{{- define "hivemind.k8sMetrics.clusterConfig" -}}
{{- $fullname := include "hivemind.fullname" . -}}
{{- $km := .Values.observability.clickstack.kubernetesMetrics -}}
{{- $ch := .Values.observability.collector.clickhouse -}}
{{- $cluster := $km.clusterName | default .Release.Name -}}
receivers:
  k8s_cluster:
    auth_type: serviceAccount
    collection_interval: {{ $km.collectionInterval }}
    node_conditions_to_report: [Ready, MemoryPressure, DiskPressure, PIDPressure]
    allocatable_types_to_report: [cpu, memory, ephemeral-storage, pods]
  k8sobjects:
    auth_type: serviceAccount
    objects:
      - name: events
        mode: watch
        group: events.k8s.io
processors:
  batch: {}
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25
  resource:
    attributes:
      - key: k8s.cluster.name
        value: {{ $cluster | quote }}
        action: upsert
  # HyperDX's "Latest Kubernetes Warning Events" panel reads the event off
  # LogAttributes['object'] (JSONExtractString for type / regarding.kind /
  # regarding.name / note) -- but the k8sobjects receiver leaves the event only
  # in the log Body. Copy body.object into that attribute (as JSON) and lift
  # severity so the panel's columns and its warning filter populate.
  transform/k8s_events:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          - set(attributes["object"], String(body["object"])) where body["object"] != nil
          - set(severity_text, body["object"]["type"]) where body["object"]["type"] != nil
exporters:
  clickhouse:
    endpoint: tcp://{{ $fullname }}-clickstack:9000?dial_timeout=10s
    database: {{ $ch.database }}
    username: {{ $ch.username }}
    password: {{ $ch.password | quote }}
    create_schema: true
service:
  pipelines:
    metrics:
      receivers: [k8s_cluster]
      processors: [memory_limiter, resource, batch]
      exporters: [clickhouse]
    logs:
      receivers: [k8sobjects]
      processors: [memory_limiter, transform/k8s_events, resource, batch]
      exporters: [clickhouse]
{{- end -}}

{{- if and .Values.observability.clickstack.enabled .Values.observability.clickstack.kubernetesMetrics.enabled }}
{{- $fullname := include "hivemind.fullname" . }}
{{- $km := .Values.observability.clickstack.kubernetesMetrics }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $fullname }}-k8s-metrics
  labels:
    {{- include "hivemind.componentLabels" (dict "ctx" . "component" "k8s-metrics") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $fullname }}-k8s-metrics
  labels:
    {{- include "hivemind.componentLabels" (dict "ctx" . "component" "k8s-metrics") | nindent 4 }}
rules:
  # k8sattributes + k8s_cluster: discover and watch object state.
  - apiGroups: [""]
    resources:
      - pods
      - nodes
      - namespaces
      - services
      - endpoints
      - replicationcontrollers
      - resourcequotas
      - persistentvolumes
      - persistentvolumeclaims
    verbs: [get, list, watch]
  # kubeletstats reads the node's /stats/summary via the kubelet API.
  - apiGroups: [""]
    resources: [nodes/stats, nodes/proxy, nodes/metrics]
    verbs: [get, list]
  - apiGroups: ["apps"]
    resources: [deployments, daemonsets, statefulsets, replicasets]
    verbs: [get, list, watch]
  - apiGroups: ["batch"]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  - apiGroups: ["autoscaling"]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch]
  # k8sobjects events receiver.
  - apiGroups: ["events.k8s.io", ""]
    resources: [events]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $fullname }}-k8s-metrics
  labels:
    {{- include "hivemind.componentLabels" (dict "ctx" . "component" "k8s-metrics") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $fullname }}-k8s-metrics
subjects:
  - kind: ServiceAccount
    name: {{ $fullname }}-k8s-metrics
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-k8s-metrics-node
  labels:
    {{- include "hivemind.componentLabels" (dict "ctx" . "component" "k8s-metrics") | nindent 4 }}
data:
  config.yaml: |
    {{- include "hivemind.k8sMetrics.nodeConfig" . | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-k8s-metrics-cluster
  labels:
    {{- include "hivemind.componentLabels" (dict "ctx" . "component" "k8s-metrics") | nindent 4 }}
data:
  config.yaml: |
    {{- include "hivemind.k8sMetrics.clusterConfig" . | nindent 4 }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ $fullname }}-k8s-metrics-node
  labels:
    {{- include "hivemind.componentLabels" (dict "ctx" . "component" "k8s-metrics") | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "hivemind.componentSelectorLabels" (dict "ctx" . "component" "k8s-metrics-node") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include "hivemind.k8sMetrics.nodeConfig" . | sha256sum }}
      labels:
        {{- include "hivemind.componentLabels" (dict "ctx" . "component" "k8s-metrics-node") | nindent 8 }}
    spec:
      serviceAccountName: {{ $fullname }}-k8s-metrics
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # The node collector reads root-owned host paths (pod logs, /proc, /sys),
      # so it runs as root -- but with all capabilities dropped and a read-only
      # root filesystem, and only read-only host mounts.
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: otel-collector
          image: "{{ $km.image.repository }}:{{ $km.image.tag }}"
          imagePullPolicy: {{ $km.image.pullPolicy }}
          args: ["--config=/etc/otel/config.yaml"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            {{- toYaml $km.daemonset.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/otel
            - name: hostfs
              mountPath: /hostfs
              readOnly: true
              mountPropagation: HostToContainer
            {{- if $km.logsCollection }}
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ $fullname }}-k8s-metrics-node
        - name: hostfs
          hostPath:
            path: /
        {{- if $km.logsCollection }}
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        {{- end }}
      tolerations:
        - operator: Exists
          effect: NoSchedule
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-k8s-metrics-cluster
  labels:
    {{- include "hivemind.componentLabels" (dict "ctx" . "component" "k8s-metrics") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "hivemind.componentSelectorLabels" (dict "ctx" . "component" "k8s-metrics-cluster") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include "hivemind.k8sMetrics.clusterConfig" . | sha256sum }}
      labels:
        {{- include "hivemind.componentLabels" (dict "ctx" . "component" "k8s-metrics-cluster") | nindent 8 }}
    spec:
      serviceAccountName: {{ $fullname }}-k8s-metrics
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: otel-collector
          image: "{{ $km.image.repository }}:{{ $km.image.tag }}"
          imagePullPolicy: {{ $km.image.pullPolicy }}
          args: ["--config=/etc/otel/config.yaml"]
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml $km.cluster.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/otel
      volumes:
        - name: config
          configMap:
            name: {{ $fullname }}-k8s-metrics-cluster
{{- end }}
