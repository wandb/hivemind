# Tailscale ingress overlay for the HiveMind self-host stack.
#
# Enabled by `hivemind serve setup` or `hivemind serve tailscale enable`, which
# set TAILSCALE_MODE=sidecar in .env; `hivemind serve up` then layers this file
# on top of docker-compose.yml. It gives the instance its own tailnet node
# (e.g. https://hivemind.your-tailnet.ts.net) with an automatic HTTPS
# certificate. TAILSCALE_AUTHKEY is optional: without one, the node asks for
# interactive login and `hivemind serve up` surfaces the browser URL — no
# long-lived secret involved.
#
# The sidecar joins Caddy's network namespace (network_mode: service:caddy) so
# Tailscale Serve can proxy to Caddy's plain-HTTP listener at 127.0.0.1:80 —
# Serve only proxies to localhost (tailscale/tailscale#8751), hence the shared
# namespace rather than reaching `caddy` over the bridge. Caddy must therefore
# serve plain HTTP (SITE_ADDRESS=http://); `hivemind serve tailscale enable`
# sets that. Caddy keeps reverse-proxying app:8080 over the compose network.
#
# Funnel (public internet, not just the tailnet) is controlled by
# TAILSCALE_FUNNEL via the generated tailscale-serve.json. Node state lives in
# the tailscale_state volume so the identity survives restarts and reboots.
services:
  tailscale:
    # Pinned for reproducibility like the rest of the stack; :latest and :stable
    # have historically shipped non-stable builds (tailscale/tailscale#11204).
    # Override with TAILSCALE_VERSION in .env.
    image: tailscale/tailscale:${TAILSCALE_VERSION:-v1.92.4}
    restart: unless-stopped
    network_mode: service:caddy
    environment:
      # Blank TS_AUTHKEY -> containerboot runs an interactive `tailscale up`;
      # the login URL lands in this container's logs (surfaced by `serve up`).
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY:-}
      # Don't re-run login when state already exists — a restart must not
      # re-prompt (keyless) or burn a one-time key (keyed).
      - TS_AUTH_ONCE=true
      - TS_HOSTNAME=${TAILSCALE_HOSTNAME:-hivemind}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_EXTRA_ARGS=${TAILSCALE_EXTRA_ARGS:-}
      # Kernel networking (needs /dev/net/tun + the caps below). Hosts without
      # the tun device can set TAILSCALE_USERSPACE=true and drop the `devices:`
      # entry; Serve still works in userspace mode.
      - TS_USERSPACE=${TAILSCALE_USERSPACE:-false}
    volumes:
      - tailscale_state:/var/lib/tailscale
      - ./tailscale-serve.json:/config/serve.json:ro
    cap_add:
      - net_admin
      - sys_module
    devices:
      - /dev/net/tun:/dev/net/tun
    depends_on:
      - caddy

volumes:
  tailscale_state:
