{{- if and .Values.observability.clickstack.enabled .Values.observability.clickstack.gateway.enabled }}
{{- $fullname := include "hivemind.fullname" . }}
{{- $gw := .Values.observability.clickstack.gateway }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullname }}-clickstack
  labels:
    {{- include "hivemind.componentLabels" (dict "ctx" . "component" "clickstack") | nindent 4 }}
  {{- with $gw.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range $gw.parentRefs }}
    - name: {{ required "observability.clickstack.gateway.parentRefs[].name is required when the ClickStack gateway is enabled" .name }}
      {{- with .namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .sectionName }}
      sectionName: {{ . }}
      {{- end }}
      {{- with .port }}
      port: {{ . }}
      {{- end }}
    {{- end }}
  hostnames:
    - {{ required "observability.clickstack.gateway.hostname is required when the ClickStack gateway is enabled" $gw.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $fullname }}-clickstack
          port: {{ .Values.observability.clickstack.uiPort }}
{{- end }}
