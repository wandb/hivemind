{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hivemind.fullname" . }}-redis
  labels:
    {{- include "hivemind.componentLabels" (dict "ctx" . "component" "redis") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: {{ .Values.redis.port }}
      targetPort: redis
  selector:
    {{- include "hivemind.componentSelectorLabels" (dict "ctx" . "component" "redis") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "hivemind.fullname" . }}-redis
  labels:
    {{- include "hivemind.componentLabels" (dict "ctx" . "component" "redis") | nindent 4 }}
spec:
  serviceName: {{ include "hivemind.fullname" . }}-redis
  replicas: 1
  selector:
    matchLabels:
      {{- include "hivemind.componentSelectorLabels" (dict "ctx" . "component" "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hivemind.componentLabels" (dict "ctx" . "component" "redis") | nindent 8 }}
      {{- with .Values.redis.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          {{- with .Values.redis.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.redis.password }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hivemind.secretName" . }}
                  key: REDIS_PASSWORD
          {{- end }}
          command:
            - sh
            - -c
            - |
              exec redis-server \
                {{ if .Values.redis.appendonly }}--appendonly yes --appendfsync {{ .Values.redis.appendfsync }}{{ end }} \
                {{ if .Values.redis.password }}--requirepass "$REDIS_PASSWORD"{{ end }}
          ports:
            - name: redis
              containerPort: {{ .Values.redis.port }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli {{ if .Values.redis.password }}-a "$REDIS_PASSWORD"{{ end }} ping | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: redis
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      {{- if not .Values.redis.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.redis.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.redis.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size | quote }}
  {{- end }}
{{- end }}
