suite: application secret
release:
  name: hivemind
  namespace: hivemind
templates:
  - templates/secret.yaml
tests:
  - it: auto-generates a JWT secret by default
    asserts:
      - isKind:
          of: Secret
      - isNotNullOrEmpty:
          path: stringData.JWT_SECRET

  - it: honors an explicitly pinned JWT secret
    set:
      secrets.jwtSecret: pinned-test-secret
    asserts:
      - equal:
          path: stringData.JWT_SECRET
          value: pinned-test-secret

  - it: renders no Secret when an existing one is supplied
    set:
      secrets.existingSecret: my-external-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: includes LLM keys only when set
    set:
      secrets.llm.anthropicApiKey: sk-test-123
    asserts:
      - equal:
          path: stringData.ANTHROPIC_API_KEY
          value: sk-test-123

  - it: omits LLM/license/secret-key entries by default
    asserts:
      - notExists:
          path: stringData.ANTHROPIC_API_KEY
      - notExists:
          path: stringData.LLM_API_KEY
      - notExists:
          path: stringData.EMBEDDINGS_API_KEY
      - notExists:
          path: stringData.HIVEMIND_SECRET_KEY
      - notExists:
          path: stringData.HIVEMIND_LICENSE

  - it: wires the generic LLM + embeddings keys, master key, and license blob
    set:
      secrets.llm.apiKey: llm-key-abc
      secrets.llm.embeddingsApiKey: emb-key-xyz
      secrets.hivemindSecretKey: master-key-1
      secrets.license: signed-license-blob
    asserts:
      - equal:
          path: stringData.LLM_API_KEY
          value: llm-key-abc
      - equal:
          path: stringData.EMBEDDINGS_API_KEY
          value: emb-key-xyz
      - equal:
          path: stringData.HIVEMIND_SECRET_KEY
          value: master-key-1
      - equal:
          path: stringData.HIVEMIND_LICENSE
          value: signed-license-blob
